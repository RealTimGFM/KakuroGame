<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KakuroGame - Guest Warning</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="grid-bg"></div>
    <div class="container">
        <div class="form-card">
            <h1 class="logo">KakuroGame</h1>
            <p class="subtitle">Playing as Guest</p>

            <div class="alert alert-error">
                You are playing as a guest. Progress is session-only and will not be
                saved beyond this session.
            </div>

            <p class="info-text">
                Want to keep your progress?
                <a href="{{ url_for('signup') }}">Sign Up</a> for a free account.
            </p>

            <form method="POST" action="{{ url_for('seed_confirm') }}">
                <input type="hidden" name="seed" value="{{ seed }}">
                <button type="submit" class="btn">Continue as Guest</button>
            </form>

            <div class="switch-link">
                <p><a href="{{ url_for('seed_entry') }}">Back</a></p>
            </div>
        </div>
    </div>
</body>
</html>
