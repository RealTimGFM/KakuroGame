<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KakuroGame - Play a Puzzle</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="grid-bg"></div>
    <div class="container">
        <div class="form-card">
            <h1 class="logo">KakuroGame</h1>
            <p class="subtitle">Enter a puzzle seed</p>

            {% if error %}
                <div class="alert alert-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('seed_entry') }}">
                <div class="input-group">
                    <label for="seed">Puzzle Seed (UUID)</label>
                    <input type="text" id="seed" name="seed" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" required>
                </div>
                <button type="submit" class="btn">Load Puzzle</button>
            </form>

            <div class="switch-link">
                <p><a href="{{ url_for('dashboard') }}">Back to Menu</a></p>
            </div>
        </div>
    </div>
</body>
</html>
