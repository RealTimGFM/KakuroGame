<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KakuroGame - Play a Puzzle</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="grid-bg"></div>

    <div class="container">
        <div class="form-card">
            <div class="card-header">
                <h1 class="logo">KakuroGame</h1>
                <p class="subtitle">Load a puzzle by seed and jump straight into a single-board challenge.</p>
            </div>

            {% if error %}
            <div class="alert alert-error">{{ error }}</div>
            {% endif %}

            <div class="notice-block" style="margin-bottom: 22px;">
                <p class="notice-title"><span class="inline-icon">#</span>Seed Entry</p>
                <p class="notice-text">Enter the 6-character puzzle code exactly as given. The board, difficulty, and leaderboard will load from that seed.</p>
            </div>

            <form method="POST" action="{{ url_for('seed_entry') }}">
                <div class="input-group">
                    <label for="seed">Puzzle Seed (6 chars)</label>
                    <input type="text" id="seed" name="seed" placeholder="3fu9a4" required>
                </div>
                <button type="submit" class="btn">
                    <span class="button-icon">#</span>
                    Load Puzzle
                </button>
            </form>

            <div class="switch-link">
                <p><a href="{{ url_for('dashboard') }}">Back to Menu</a></p>
            </div>
        </div>
    </div>
</body>

</html>
