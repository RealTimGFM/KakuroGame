<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KakuroGame - Game Menu</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="grid-bg"></div>
    <div class="container">
        <div class="form-card">
            <h1 class="logo">KakuroGame</h1>
            <p class="subtitle">Welcome, {{ username }}!</p>

            {% if is_guest %}
                <p class="info-text">You are playing as a guest. Progress resets when the session ends.</p>
            {% else %}
                <p class="info-text">Choose a mode to start playing.</p>
            {% endif %}

            <!-- Menu buttons (frontend only for now) -->
            <a href="#" class="btn">Campaign</a>
            <a href="#" class="btn">New Run</a>
            <a href="{{ url_for('seed_entry') }}" class="btn">Play a Puzzle</a>
            <a href="#" class="btn">Setting</a>

            <!-- Exit -->
            <a href="{{ url_for('logout') }}" class="btn btn-logout">
                {% if is_guest %}Exit Guest{% else %}Logout{% endif %}
            </a>
        </div>
    </div>
</body>
</html>
